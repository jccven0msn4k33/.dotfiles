# =============================================================================
# Tmux Configuration
# =============================================================================

# =============================================================================
# Load plugins
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
# set -g @plugin 'tmux-plugins/tmux-cpu'
# set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'thewtex/tmux-mem-cpu-load'
set -g @plugin 'briansalehi/tmux-acpi'
set -g @plugin 'rickstaa/tmux-notify'
set -g @plugin 'b0o/tmux-autoreload'
run '~/.tmux/plugins/tpm/tpm'

# Set prefix to Ctrl-b (default)
set-option -g prefix C-b

# Enable mouse support
set -g mouse on

# Set terminal colors to 256-color mode
set -g default-terminal "screen-256color"

# Increase history limit
set -g history-limit 5000

# =============================================================================
# Key Bindings
# =============================================================================

# Split panes with | and -
bind | split-window -h
bind - split-window -v

# Navigate panes with arrow keys
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Create new window with c
bind c new-window

# Close window/pane with x
bind x kill-pane

# Reload config with r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# =============================================================================
# Status Bar - SteamOS Theme
# =============================================================================

# Status bar background and foreground
set -g status-style bg="#0E1419",fg="#00BFFF"

# Center window list
set -g status-justify centre

# Status bar refresh interval
set -g status-interval 1

# Left status - session name
set -g status-left "#[bg=#00BFFF,fg=#0E1419,bold] #{session_name} #[fg=green,bg=black] #(tmux-mem-cpu-load --colors --interval 2) #[default] "
set -g status-left-length 20

# Right status - git status and time
# Display gitmux if installed, otherwise just show time
if-shell 'command -v gitmux >/dev/null 2>&1' \
    'set -g status-right "#{prefix_highlight} #(gitmux -cfg $HOME/.gitmux.conf \"#{pane_current_path}\") #[bg=#cccccc,fg=#0E1419,bold] POW: #{acpi_adapter} | #{acpi_battery} #[bg=#00BFFF,fg=#0E1419,bold] %a %h-%d %H:%M:%S #[default]"' \
    'set -g status-right "#{prefix_highlight} #[bg=#cccccc,fg=#0E1419,bold] POW: #{acpi_adapter} | #{acpi_battery} #[bg=#00BFFF,fg=#0E1419,bold] %a %h-%d %H:%M:%S #[default]"'
set -g status-right-length 100

# Battery/ACPI
# Please refer to this documentation: https://github.com/briansalehi/tmux-acpi
set -g @acpi_format_begin '#[fg=white,bg=colour236]'
set -g @acpi_format_end '#[fg=white,bg=black]'
set -g @acpi_icon_thermal_unit 'Celsius'

# Window status
set -g window-status-format "#[bg=#1a2332,fg=#00BFFF] #W "
set -g window-status-current-format "#[bg=#00BFFF,fg=#0E1419,bold] #W #[default]"

# =============================================================================
# Pane Border Colors
# =============================================================================

# Steam dark theme borders
set -g pane-border-style fg="#0E1419"
set -g pane-active-border-style fg="#00BFFF"

